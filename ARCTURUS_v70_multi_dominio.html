<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ARCTURUS v8.0 - Teste</title>
    <style>
        body {
            background: #0a0e1a;
            color: #f0a500;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            flex-direction: column;
        }
        h1 {
            font-size: 4rem;
            margin-bottom: 0;
        }
        p {
            font-size: 1.2rem;
            color: #7a96b2;
        }
        .spinner {
            border: 4px solid #1a1a2e;
            border-top: 4px solid #f0a500;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <h1>🏛️ ARCTURUS</h1>
    <p>v8.0 — Sistema de Integridade Científica</p>
    <div class="spinner"></div>
    <p style="font-size: 0.8rem; color: #444;">
        Se você está vendo esta mensagem, o GitHub Pages está funcionando.
    </p>
</body>
</html>
